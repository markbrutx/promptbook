name: digest-table
description: Builds a variable-length table from runtime rows (count and order are computed).
samples:
  - label: empty
    context: { rows: 0 }
    output: |
      No rows to summarize yet.
  - label: filled
    context: { rows: 3 }
    output: |
      Summary table (3 rows):
      - row 1: ready
      - row 2: ready
      - row 3: ready
