name: sponsor-mention
# This composition's whole job is producing a sponsor-integrated mention. Under
# kid-safe compliance there is no acceptable output, so we forbid both the
# integration block and the task itself — the resolver returns the kid-safe
# persona + guardrails only, which is the explicit "no sponsor content here"
# signal for downstream callers.
base:
  - persona
  - guardrails
  - sport-football
  - tier-free
  - platform-broadcast-tv
  - compliance-standard
  - sponsor-mention
  - task-sponsor-mention
  - format-prose
  - locale
rules:
  - when: { sport: basketball }
    replace: { sport-football: sport-basketball }
  - when: { sport: tennis }
    replace: { sport-football: sport-tennis }
  - when: { sport: motorsport }
    replace: { sport-football: sport-motorsport }

  - when: { tier: premium }
    replace: { tier-free: tier-premium }
  - when: { tier: vip }
    replace: { tier-free: tier-vip }

  - when: { platform: mobile-app }
    replace: { platform-broadcast-tv: platform-mobile-app }
  - when: { platform: social }
    replace: { platform-broadcast-tv: platform-social }

  - when: { compliance: kid-safe }
    replace: { compliance-standard: compliance-kid-safe }
  - when: { compliance: betting-allowed-region }
    replace: { compliance-standard: compliance-betting }

  # forbid wins over the base list: even though sponsor-mention and the task
  # are in the base order, kid-safe pulls them out as the final filter.
  - when: { compliance: kid-safe }
    forbid: [sponsor-mention, task-sponsor-mention]
